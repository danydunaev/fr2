<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Заметки - Shop Notes</title>
    
    <!-- ==================== WEB APP MANIFEST ==================== -->
    <link rel="manifest" href="manifest.json">
    
    <!-- ==================== ОСНОВНЫЕ МЕТА-ТЕГИ ==================== -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <meta name="application-name" content="Shop Notes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Заметки">
    
    <!-- ==================== FAVICON ==================== -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
    <link rel="shortcut icon" href="icons/favicon.ico">
    <link rel="apple-touch-icon" href="icons/icon-180x180.png">
    <link rel="mask-icon" href="icons/icon.svg" color="#667eea">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            background: #0b0f19;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            color: #e7eaf3;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }
        
        .header__inner {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .header__title {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .brand {
            font-weight: 700;
            letter-spacing: 0.3px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header__right {
            opacity: 0.75;
            font-size: 13px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .nav-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .nav-tab {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            text-align: center;
        }
        
        .nav-tab:hover {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.02);
        }
        
        .nav-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 16px;
            overflow-y: auto;
        }
        
        .app-content {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }
        
        .footer__inner {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 14px 16px;
            opacity: 0.7;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .status-indicator.online {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
        }
        
        .status-indicator.offline {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: none;
        }
        
        .status-indicator.offline .status-dot {
            animation: pulse 1s infinite;
        }
        
        /* ==================== КНОПКИ PUSH ==================== */
        .push-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .btn-push {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.5);
            color: #667eea;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn-push:hover {
            background: rgba(102, 126, 234, 0.25);
            border-color: rgba(102, 126, 234, 0.7);
        }
        
        .btn-push.disable {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }
        
        .btn-push.disable:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.7);
        }
        
        /* ==================== АНИМАЦИИ УВЕДОМЛЕНИЙ ==================== */
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== APP SHELL (каркас приложения) ==================== -->
    
    <header class="header">
        <div class="header__inner">
            <div class="header__title">
                <div class="brand">📝 Shop Notes</div>
                <div class="header__right">
                    <div id="status-indicator" class="status-indicator online">
                        <div class="status-dot"></div>
                        <span>Онлайн</span>
                    </div>
                    <span>PWA</span>
                </div>
            </div>
            <nav class="nav-tabs">
                <button id="home-tab" class="nav-tab active">Главная</button>
                <button id="about-tab" class="nav-tab">О приложении</button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Сюда динамически загружается контент -->
            <div id="app-content" class="app-content">
                <p style="text-align: center; opacity: 0.7;">Загрузка...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__inner">
            <div style="display: flex; gap: 24px; align-items: center; width: 100%; justify-content: space-between;">
                <div>
                    <span>© 2026 Shop Notes</span>
                    <span style="margin-left: 12px;">v1.0.0 | PWA</span>
                </div>
                <div class="push-controls">
                    <button id="enable-push" class="btn-push" title="Включить push-уведомления">
                        🔔 Включить уведомления
                    </button>
                    <button id="disable-push" class="btn-push disable" title="Отключить push-уведомления" style="display: none;">
                        🔕 Отключить уведомления
                    </button>
                </div>
            </div>
        </div>
    </footer>

    <!-- ==================== СКРИПТЫ ==================== -->
    <!-- Socket.IO для WebSocket -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Основной скрипт приложения -->
    <script src="app.js"></script>
</body>
</html>
